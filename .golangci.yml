version: "2"

linters:
  default: all

  disable:
    - cyclop
    - gocyclo
    - depguard
    - exhaustruct
    - forcetypeassert
    - funlen
    - gochecknoglobals
    - gocognit
    - ireturn
    - nonamedreturns
    - paralleltest
    - prealloc
    - varnamelen
    - wsl

  settings:
    dupl:
      threshold: 100
    goconst:
      min-len: 2
      min-occurrences: 2
    gocritic:
      disabled-checks:
        - wrapperFunc
      enabled-tags:
        - performance
        - style
        - experimental
    govet:
      enable:
        - shadow
    lll:
      line-length: 140
    misspell:
      locale: US

  exclusions:
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gosec
        text: weak cryptographic primitive

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
